name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gitleaks:
    name: Gitleaks — detect secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for historical scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Gitleaks sai com código 1 se encontrar segredo → CI falha
        # Para tornar não-bloqueante (aviso apenas), adicionar: continue-on-error: true
